<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Palace Porta Potties">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9B45E"/>
      <stop offset="100%" stop-color="#B8912F"/>
    </linearGradient>
  </defs>

  <!-- Crown accent (restrained, premium) -->
  <g transform="translate(28, 18)">
    <!-- Crown base -->
    <path d="M 0 24 L 4 4 L 14 18 L 24 0 L 34 18 L 44 4 L 48 24 Z"
          fill="url(#gold)" stroke="#0B1F3A" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Crown band -->
    <rect x="0" y="24" width="48" height="6" fill="#0B1F3A"/>
    <!-- Crown gems -->
    <circle cx="4" cy="8" r="1.8" fill="#0B1F3A"/>
    <circle cx="24" cy="4" r="2.2" fill="#0B1F3A"/>
    <circle cx="44" cy="8" r="1.8" fill="#0B1F3A"/>
  </g>

  <!-- Wordmark -->
  <text x="98" y="58" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="36" fill="#0B1F3A" letter-spacing="0.5">PALACE</text>
  <text x="98" y="92" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="18" fill="#173B7A" letter-spacing="3">PORTA POTTIES</text>

  <!-- Accent line -->
  <line x1="98" y1="68" x2="380" y2="68" stroke="url(#gold)" stroke-width="1.5"/>
</svg>
