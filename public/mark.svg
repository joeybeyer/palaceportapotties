<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Palace Porta Potties">
  <defs>
    <linearGradient id="gold-mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9B45E"/>
      <stop offset="100%" stop-color="#B8912F"/>
    </linearGradient>
  </defs>

  <!-- Shield/crest background -->
  <path d="M 100 10 L 180 40 L 180 110 Q 180 160 100 190 Q 20 160 20 110 L 20 40 Z"
        fill="#0B1F3A" stroke="url(#gold-mono)" stroke-width="3"/>

  <!-- Crown -->
  <g transform="translate(60, 50)">
    <path d="M 0 28 L 5 4 L 20 22 L 40 0 L 60 22 L 75 4 L 80 28 Z"
          fill="url(#gold-mono)" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
    <rect x="0" y="28" width="80" height="6" fill="url(#gold-mono)"/>
  </g>

  <!-- P monogram -->
  <text x="100" y="150" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="52" fill="#FFFFFF">PPP</text>
</svg>
